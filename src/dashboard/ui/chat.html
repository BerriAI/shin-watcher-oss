<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>shin-watcher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --sidebar: #111114; --surface: #18191e; --border: #25262c;
      --text: #e2e4ec; --muted: #636470; --cyan: #38bdf8; --green: #34d399;
      --red: #f87171; --purple: #c084fc; --accent: #6366f1;
      --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      --mono: ui-monospace, monospace;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
    .shell { display: flex; height: 100vh; }

    .sidebar {
      width: 240px; background: var(--sidebar); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-header { padding: 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .logo { width: 22px; height: 22px; background: var(--accent); border-radius: 6px; display: grid; place-items: center; font-size: 12px; font-weight: 700; color: #fff; }
    .btn-new, .btn-stop-head { border: none; border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-new { background: var(--accent); color: #fff; flex: 1; }
    .btn-stop-head { background: rgba(248,113,113,0.15); color: var(--red); }

    .section-label { padding: 10px 12px 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
    .sessions { flex: 1; overflow-y: auto; }
    .row { padding: 8px 12px; cursor: pointer; border-left: 2px solid transparent; font-size: 12px; }
    .row:hover { background: rgba(255,255,255,0.04); }
    .row.on { background: rgba(99,102,241,0.12); border-left-color: var(--accent); }
    .row .t { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row .m { font-size: 10px; color: var(--muted); margin-top: 2px; display: flex; gap: 6px; align-items: center; }
    .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: p 1.2s ease-in-out infinite; }
    @keyframes p { 50% { opacity: 0.35; transform: scale(0.8); } }
    .chip { font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 3px; }
    .crun { background: rgba(99,102,241,0.2); color: #a5b4fc; }
    .cok { background: rgba(52,211,153,0.15); color: var(--green); }
    .cbad { background: rgba(248,113,113,0.15); color: var(--red); }
    .cmed { background: rgba(251,191,36,0.15); color: #fbbf24; }

    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .chat-head { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; color: var(--muted); }
    .msgs { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    .bubble { max-width: 92%; padding: 10px 13px; border-radius: 12px; font-size: 14px; line-height: 1.55; word-break: break-word; }
    .bubble.user { align-self: flex-end; background: rgba(192,132,252,0.14); border: 1px solid rgba(192,132,252,0.25); }
    .bubble.ast { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
    .bubble.sys { align-self: center; font-size: 12px; color: var(--muted); font-style: italic; max-width: 95%; text-align: center; border: none; background: transparent; }

    .log-wrap { border-top: 1px solid var(--border); max-height: 28vh; display: flex; flex-direction: column; flex-shrink: 0; }
    .log-toggle { padding: 6px 16px; font-size: 11px; color: var(--muted); cursor: pointer; user-select: none; background: rgba(0,0,0,0.25); }
    .log-toggle:hover { color: var(--text); }
    .log-body { flex: 1; overflow-y: auto; padding: 8px 12px; font-family: var(--mono); font-size: 11px; line-height: 1.45; color: var(--muted); display: none; background: #0a0a0c; }
    .log-wrap.open .log-body { display: block; }

    .input-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
    textarea {
      flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 13px; font-size: 14px; color: var(--text); font-family: var(--sans);
      resize: none; outline: none; min-height: 44px; max-height: 140px; line-height: 1.45;
    }
    textarea:focus { border-color: var(--accent); }
    .btn-send { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .md b, .md strong { font-weight: 600; }
    .md em, .md i { font-style: italic; }
    .md code { font-family: var(--mono); font-size: 12px; background: rgba(255,255,255,0.06); padding: 1px 4px; border-radius: 3px; }

    /* In-chat live repro progress */
    .repro-live {
      align-self: flex-start;
      width: 92%;
      max-width: 720px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #121318;
      overflow: hidden;
      font-size: 12px;
      flex-shrink: 0;
    }
    .repro-live-head {
      padding: 10px 12px;
      background: rgba(99,102,241,0.12);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .repro-live-title { font-weight: 600; color: var(--text); font-size: 13px; }
    .repro-live-issue { color: var(--cyan); }
    .repro-live-sub { font-size: 11px; color: var(--muted); max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .repro-live-meta { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .repro-live-status { color: var(--cyan); font-weight: 600; }
    .repro-live-status.done { color: var(--green); }
    .repro-live-steps {
      max-height: min(18vh, 150px);
      overflow-y: auto;
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.45;
      color: var(--muted);
      background: #0a0a0c;
    }
    .repro-live-step { margin-bottom: 8px; padding: 6px 8px; border-radius: 6px; background: rgba(255,255,255,0.03); border-left: 3px solid var(--border); }
    .repro-live-step.run { border-left-color: var(--cyan); }
    .repro-live-step.done { border-left-color: var(--green); }
    .repro-live-step.err { border-left-color: var(--red); }
    .repro-live-tool { color: var(--purple); font-weight: 600; }
    .repro-live-msg { color: var(--text); opacity: 0.85; }
    /* Native stream from repro model (pi-ai assistantMessageEvent — thinking + text deltas) */
    .repro-live-agent-stream {
      border-bottom: 1px solid var(--border);
      background: rgba(99, 102, 241, 0.07);
      max-height: min(40vh, 340px);
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.5;
    }
    .repro-live-think {
      display: none;
      padding: 8px 12px 10px;
      border-bottom: 1px dashed var(--border);
      background: rgba(0, 0, 0, 0.22);
      font-size: 11px;
      color: var(--muted);
    }
    .repro-live-think-label, .repro-live-say-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 6px;
    }
    .repro-live-think-label { color: #94a3b8; }
    .repro-live-say-label { color: var(--cyan); }
    .repro-live-say { padding: 10px 12px 12px; color: var(--text); }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">S</div>
      <button type="button" class="btn-new" id="btn-new">+ New chat</button>
      <button type="button" class="btn-stop-head" id="btn-stop-all" title="Stop all repro agents">■</button>
    </div>
    <div class="sessions" id="sessions"></div>
    <a href="/runs" style="display:flex;align-items:center;gap:7px;padding:9px 12px;margin:4px 6px;font-size:12px;color:var(--muted);text-decoration:none;border-radius:6px;border-top:1px solid var(--border);margin-top:auto" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">
      <span style="font-size:13px">🔬</span> View runs
    </a>
  </aside>

  <main class="main">
    <div class="chat-head" id="chat-head">Chat — the assistant decides when to start a repro</div>
    <div class="msgs" id="msgs"></div>
    <div class="log-wrap" id="log-wrap">
      <div class="log-toggle" id="log-toggle">▸ Repro log — pick a run in the sidebar</div>
      <div class="log-body" id="log-body"></div>
    </div>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Ask anything…  or “reproduce #12345” / paste a GitHub issue URL"></textarea>
      <button type="button" class="btn-send" id="btn-send">Send</button>
    </div>
  </main>
</div>

<script>
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const md = s => esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<em>$1</em>');

function newChatSessionId() {
  if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
    return crypto.randomUUID();
  }
  return 'sess-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 11);
}

/** One id per “New chat”; sent with /api/chat and echoed on Live SSE so progress stays scoped. */
let chatSessionId = newChatSessionId();

function liveEventForThisChat(ev) {
  return ev.session_id != null && ev.session_id === chatSessionId;
}

let chatHistory = []; // { role: 'user'|'assistant', content }
let watchTaskId = null;
let es = null;

/** Live repro panel + follow (auto-attach on run_start) */
let reproLivePanel = null;
let reproTick = null;
let reproStartedAt = 0;

/** Content blocks keyed by contentIndex — streamed from agent message_update events */
let agentThinkParts = Object.create(null);
let agentTextParts = Object.create(null);
const msgs = document.getElementById('msgs');
const input = document.getElementById('input');
const btnSend = document.getElementById('btn-send');
const sessionsEl = document.getElementById('sessions');
const logWrap = document.getElementById('log-wrap');
const logToggle = document.getElementById('log-toggle');
const logBody = document.getElementById('log-body');

function bubble(role, html, cls) {
  const d = document.createElement('div');
  d.className = 'bubble ' + cls;
  d.innerHTML = html;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUser(text) {
  bubble('user', esc(text), 'user');
  chatHistory.push({ role: 'user', content: text });
}

function addAssistant(text) {
  bubble('assistant', '<span class="md">' + md(text) + '</span>', 'ast');
  chatHistory.push({ role: 'assistant', content: text });
}

function addSys(text) {
  const d = document.createElement('div');
  d.className = 'bubble sys';
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function clearReproLive() {
  if (reproTick) {
    clearInterval(reproTick);
    reproTick = null;
  }
  agentThinkParts = Object.create(null);
  agentTextParts = Object.create(null);
  if (reproLivePanel && reproLivePanel.parentNode) reproLivePanel.remove();
  reproLivePanel = null;
  reproStartedAt = 0;
}

function joinAgentParts(parts) {
  return Object.keys(parts)
    .map(k => +k)
    .sort((a, b) => a - b)
    .map(i => parts[i])
    .filter(Boolean)
    .join('\n\n');
}

function renderAgentStream() {
  if (!reproLivePanel) return;
  const thinkWrap = reproLivePanel.querySelector('.repro-live-think');
  const thinkBody = reproLivePanel.querySelector('.repro-live-think-body');
  const sayBody = reproLivePanel.querySelector('.repro-live-agent-body');
  const stream = reproLivePanel.querySelector('.repro-live-agent-stream');

  const thinking = joinAgentParts(agentThinkParts).trim();
  const text = joinAgentParts(agentTextParts).trim();

  if (thinking) {
    thinkWrap.style.display = 'block';
    thinkBody.textContent = thinking.slice(-4000);
  } else {
    thinkWrap.style.display = 'none';
  }

  sayBody.innerHTML = md(text || 'Waiting for the agent to emit text or choose a tool…');
  if (stream) stream.scrollTop = stream.scrollHeight;
  msgs.scrollTop = msgs.scrollHeight;
}

function appendReproStep(html, cls) {
  const steps = reproLivePanel && reproLivePanel.querySelector('.repro-live-steps');
  if (!steps) return;
  const row = document.createElement('div');
  row.className = 'repro-live-step ' + cls;
  row.innerHTML = html;
  steps.appendChild(row);
  steps.scrollTop = steps.scrollHeight;
  msgs.scrollTop = msgs.scrollHeight;
}

function setReproStatus(text, cls) {
  const st = reproLivePanel && reproLivePanel.querySelector('.repro-live-status');
  if (!st) return;
  st.textContent = text;
  st.classList.remove('done');
  if (cls) st.classList.add(cls);
}

function startReproTimer() {
  if (reproTick) clearInterval(reproTick);
  const tick = () => {
    const el = reproLivePanel && reproLivePanel.querySelector('.repro-live-elapsed');
    if (!el) return;
    const sec = Math.floor((Date.now() - reproStartedAt) / 1000);
    el.textContent = sec < 60 ? sec + 's' : Math.floor(sec / 60) + 'm ' + (sec % 60) + 's';
  };
  tick();
  reproTick = setInterval(tick, 1000);
}

function ensureReproPendingPanel(info) {
  clearReproLive();
  watchTaskId = null;
  reproStartedAt = Date.now();
  const issue = info && info.issueNumber ? '#' + info.issueNumber : 'next eligible issue';
  reproLivePanel = document.createElement('div');
  reproLivePanel.className = 'repro-live';
  reproLivePanel.dataset.taskId = 'pending';
  reproLivePanel.dataset.sessionId = chatSessionId;
  reproLivePanel.innerHTML =
    '<div class="repro-live-head">' +
      '<div><div class="repro-live-title">Preparing reproduction <span class="repro-live-issue">' + esc(issue) + '</span></div>' +
      '<div class="repro-live-sub">Queued from this chat. Setting up worktree, proxy, and agent runtime…</div></div>' +
      '<div class="repro-live-meta"><span class="repro-live-status">Preparing</span> · <span class="repro-live-elapsed">0s</span></div>' +
    '</div>' +
    '<div class="repro-live-agent-stream">' +
      '<div class="repro-live-think"><div class="repro-live-think-label">Thinking</div><div class="repro-live-think-body"></div></div>' +
      '<div class="repro-live-say"><div class="repro-live-say-label">Agent stream</div><div class="repro-live-agent-body">Queued. Waiting for the repro agent to finish setup and start streaming its worklog…</div></div>' +
    '</div>' +
    '<div class="repro-live-steps"></div>';
  msgs.appendChild(reproLivePanel);
  startReproTimer();
  appendReproStep('<span class="repro-live-tool">●</span> Repro queued from chat', 'run');
  appendReproStep('<span class="repro-live-tool">●</span> Preparing isolated clone and local proxy', 'run');
  msgs.scrollTop = msgs.scrollHeight;
}

function handleReproSetupEvent(ev) {
  if (!liveEventForThisChat(ev)) return;
  if (!reproLivePanel) ensureReproPendingPanel({ issueNumber: ev.issueNumber });
  reproLivePanel.dataset.taskId = ev.taskId || 'pending';
  watchTaskId = ev.taskId || watchTaskId;
  const title = reproLivePanel.querySelector('.repro-live-title');
  const sub = reproLivePanel.querySelector('.repro-live-sub');
  const body = reproLivePanel.querySelector('.repro-live-agent-body');
  if (title) title.innerHTML = 'Preparing reproduction <span class="repro-live-issue">#' + esc(String(ev.issueNumber)) + '</span>';
  if (sub) sub.textContent = ev.issueTitle || 'Preparing run';
  if (body && body.dataset.hasPlan !== 'true') body.textContent = ev.message || 'Preparing repro agent…';
  setReproStatus('Preparing');
  appendReproStep('<span class="repro-live-tool">●</span> ' + esc(ev.message || 'Preparing'), 'run');
}

function handleReproPlanEvent(ev) {
  if (!liveEventForThisChat(ev)) return;
  if (!reproLivePanel) ensureReproPendingPanel({ issueNumber: ev.issueNumber });
  reproLivePanel.dataset.taskId = ev.taskId || 'pending';
  watchTaskId = ev.taskId || watchTaskId;
  const title = reproLivePanel.querySelector('.repro-live-title');
  const sub = reproLivePanel.querySelector('.repro-live-sub');
  const body = reproLivePanel.querySelector('.repro-live-agent-body');
  if (title) title.innerHTML = 'Preparing reproduction <span class="repro-live-issue">#' + esc(String(ev.issueNumber)) + '</span>';
  if (sub) sub.textContent = ev.issueTitle || 'Preparing run';
  if (body) {
    body.innerHTML = md(ev.message || 'Reading issue and preparing repro plan...');
    body.dataset.hasPlan = 'true';
  }
  setReproStatus('Preparing');
  appendReproStep('<span class="repro-live-tool">●</span> Initial issue readout ready', 'done');
}

function handleReproSetupError(ev) {
  if (!liveEventForThisChat(ev)) return;
  if (!reproLivePanel) ensureReproPendingPanel({ issueNumber: ev.issueNumber });
  reproLivePanel.dataset.taskId = ev.taskId || 'pending';
  const body = reproLivePanel.querySelector('.repro-live-agent-body');
  // Show just the first meaningful line, not a full stack trace
  const shortErr = (ev.error || 'unknown error').split('\n').find(l => l.trim() && !l.startsWith('---')) || ev.error;
  if (body) body.innerHTML = '<span style="color:var(--red)">Setup failed:</span> ' + esc((shortErr || ev.error || 'unknown').slice(0, 300));
  setReproStatus('Failed', 'done');
  appendReproStep('<span class="repro-live-tool">●</span> setup failed', 'err');
}

function ensureReproLivePanel(ev) {
  clearReproLive();
  watchTaskId = ev.taskId;
  reproStartedAt = ev.startedAt || Date.now();
  reproLivePanel = document.createElement('div');
  reproLivePanel.className = 'repro-live';
  reproLivePanel.dataset.taskId = ev.taskId;
  const title = esc(ev.issueTitle || ('Issue #' + ev.issueNumber));
  const setupPhase = ev.phase === 'setup';
  reproLivePanel.innerHTML =
    '<div class="repro-live-head">' +
      '<div><div class="repro-live-title">' + (setupPhase ? 'Preparing reproduction' : 'Reproduction run') + ' <span class="repro-live-issue">#' + esc(String(ev.issueNumber)) + '</span></div>' +
      '<div class="repro-live-sub" title="' + title + '">' + title + '</div></div>' +
      '<div class="repro-live-meta"><span class="repro-live-status">' + (setupPhase ? 'Preparing' : 'Running') + '</span> · <span class="repro-live-elapsed">0s</span></div>' +
    '</div>' +
    '<div class="repro-live-agent-stream">' +
      '<div class="repro-live-think"><div class="repro-live-think-label">Thinking</div><div class="repro-live-think-body"></div></div>' +
      '<div class="repro-live-say"><div class="repro-live-say-label">Agent stream</div><div class="repro-live-agent-body">Waiting for the agent to emit text or choose a tool…</div></div>' +
    '</div>' +
    '<div class="repro-live-steps"></div>';
  msgs.appendChild(reproLivePanel);
  startReproTimer();
  appendReproStep('<span class="repro-live-tool">●</span> ' + (setupPhase ? 'Run allocated' : 'Run started') + ' — task <code>' + esc(ev.taskId.slice(0, 36)) + (ev.taskId.length > 36 ? '…' : '') + '</code>', 'run');
  msgs.scrollTop = msgs.scrollHeight;
}

function markReproAgentReady(ev) {
  if (!liveEventForThisChat(ev)) return;
  if (!reproLivePanel || reproLivePanel.dataset.taskId !== ev.taskId) {
    ensureReproLivePanel(ev);
    return;
  }
  const title = reproLivePanel.querySelector('.repro-live-title');
  const body = reproLivePanel.querySelector('.repro-live-agent-body');
  if (title) title.innerHTML = 'Reproduction run <span class="repro-live-issue">#' + esc(String(ev.issueNumber)) + '</span>';
  if (body && body.dataset.hasPlan !== 'true') body.textContent = 'Agent is ready. Waiting for its public worklog…';
  setReproStatus('Running');
  appendReproStep('<span class="repro-live-tool">●</span> Agent runtime ready', 'done');
}

function finishReproLivePanel(taskId, verdict, verdictReasoning) {
  if (!reproLivePanel || reproLivePanel.dataset.taskId !== taskId) return;
  if (reproTick) {
    clearInterval(reproTick);
    reproTick = null;
  }
  const st = reproLivePanel.querySelector('.repro-live-status');
  if (st) {
    st.textContent = 'Finished';
    st.classList.add('done');
  }
  if (verdict != null) {
    const VERDICT_LABEL = ['Unreproducible','Setup failed','Partial','Similar symptoms','Reproduced','Fully validated'];
    const VERDICT_COLOR = ['var(--muted)','var(--red)','#fbbf24','#fbbf24','var(--green)','var(--cyan)'];
    const label = VERDICT_LABEL[verdict] || 'Unknown';
    const color = VERDICT_COLOR[verdict] || 'var(--muted)';
    const chip = document.createElement('div');
    chip.style.cssText = `margin:8px 12px 0;padding:7px 10px;border-radius:6px;background:rgba(255,255,255,0.04);border-left:3px solid ${color};font-size:12px;`;
    chip.innerHTML = `<span style="font-weight:700;color:${color}">${verdict}/5 — ${esc(label)}</span>` +
      (verdictReasoning ? `<div style="margin-top:4px;color:var(--text);opacity:.8;">${esc(verdictReasoning)}</div>` : '');
    const steps = reproLivePanel.querySelector('.repro-live-steps');
    if (steps) steps.prepend(chip);
  }
  appendReproStep('<span class="repro-live-tool">●</span> Run ended — see sidebar for verdict.', 'done');
  msgs.scrollTop = msgs.scrollHeight;
}

let lastMsgUpdateLine = null;
function handleReproLiveEvent(ev) {
  if (ev.taskId == null || !liveEventForThisChat(ev)) return;
  const panelId = reproLivePanel && reproLivePanel.dataset.taskId;
  if (!panelId || ev.taskId !== panelId) return;

  if (ev.type === 'agent_start') {
    appendReproStep('<span class="repro-live-tool">Agent</span> started', 'run');
    return;
  }
  if (ev.type === 'turn_start') {
    appendReproStep('— model turn —', 'run');
    return;
  }
  if (ev.type === 'tool_execution_start') {
    appendReproStep(
      '<span class="repro-live-tool">→ ' + esc(ev.toolName) + '</span> <span class="repro-live-msg">running</span>',
      'run'
    );
    return;
  }
  if (ev.type === 'tool_execution_update') {
    // Keep detailed commands/results out of the main chat. The raw stream remains in the bottom log.
    return;
  }
  if (ev.type === 'tool_execution_end') {
    const ok = !ev.isError;
    appendReproStep(
      '<span class="repro-live-tool">← ' + esc(ev.toolName) + '</span> ' +
        (ok ? '<span style="color:var(--green)">ok</span>' : '<span style="color:var(--red)">error</span>'),
      ok ? 'done' : 'err'
    );
    return;
  }
  if (ev.type === 'message_update' && ev.assistantMessageEvent) {
    const ae = ev.assistantMessageEvent;
    const idx = ae.contentIndex ?? 0;
    if (ae.type === 'thinking_delta') {
      agentThinkParts[idx] = (agentThinkParts[idx] || '') + (ae.delta || '');
      renderAgentStream();
      return;
    }
    if (ae.type === 'thinking_end') {
      agentThinkParts[idx] = ae.content || agentThinkParts[idx] || '';
      renderAgentStream();
      return;
    }
    if (ae.type === 'text_delta') {
      agentTextParts[idx] = (agentTextParts[idx] || '') + (ae.delta || '');
      renderAgentStream();
      return;
    }
    if (ae.type === 'text_end') {
      agentTextParts[idx] = ae.content || agentTextParts[idx] || '';
      renderAgentStream();
      return;
    }
    if (ae.type === 'toolcall_end') {
      const tool = ae.toolCall || {};
      if (!joinAgentParts(agentTextParts).trim() && tool.name) {
        agentTextParts[idx] = 'Using `' + tool.name + '` to continue the investigation…';
      }
      renderAgentStream();
      return;
    }
  }
}

async function sendChat() {
  const t = input.value.trim();
  if (!t) return;
  input.value = '';
  input.style.height = 'auto';
  addUser(t);
  btnSend.disabled = true;
  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatHistory, stream: true, session_id: chatSessionId }),
    });
    const ct = r.headers.get('content-type') || '';

    if (!r.ok || !ct.includes('text/event-stream')) {
      const raw = await r.text();
      let j = {};
      try {
        j = raw ? JSON.parse(raw) : {};
      } catch {
        addAssistant('Server returned non-JSON (HTTP ' + r.status + '): ' + raw.slice(0, 400));
        return;
      }
      addAssistant((j.reply || j.error || raw || 'HTTP ' + r.status).toString().slice(0, 2000));
      if (j.repro === true) ensureReproPendingPanel(j);
      return;
    }

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let acc = '';
    let finalized = false;

    const bubbleEl = document.createElement('div');
    bubbleEl.className = 'bubble ast';
    const span = document.createElement('span');
    span.className = 'md';
    bubbleEl.appendChild(span);
    msgs.appendChild(bubbleEl);

    const scroll = () => { msgs.scrollTop = msgs.scrollHeight; };

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let sep;
      while ((sep = buf.indexOf('\n\n')) !== -1) {
        const block = buf.slice(0, sep);
        buf = buf.slice(sep + 2);
        for (const line of block.split('\n')) {
          if (!line.startsWith('data:')) continue;
          let j;
          try {
            j = JSON.parse(line.slice(5).trim());
          } catch {
            continue;
          }
          if (j.type === 'delta' && j.text) {
            acc += j.text;
            span.innerHTML = md(acc);
            scroll();
          } else if (j.type === 'done' && !finalized) {
            finalized = true;
            acc = j.reply != null ? j.reply : acc;
            span.innerHTML = md(acc);
            chatHistory.push({ role: 'assistant', content: acc });
            if (j.repro === true) ensureReproPendingPanel(j);
            scroll();
          } else if (j.type === 'error' && !finalized) {
            finalized = true;
            acc = 'Sorry — chat failed: ' + (j.message || 'unknown');
            span.innerHTML = md(acc);
            chatHistory.push({ role: 'assistant', content: acc });
            scroll();
          }
        }
      }
    }

    if (!finalized && acc) {
      chatHistory.push({ role: 'assistant', content: acc });
      scroll();
    }
  } catch (e) {
    addAssistant('Network error: ' + e.message);
  } finally {
    btnSend.disabled = false;
    input.focus();
  }
}

btnSend.onclick = sendChat;
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});

document.getElementById('btn-new').onclick = () => {
  chatHistory = [];
  msgs.innerHTML = '';
  watchTaskId = null;
  lastMsgUpdateLine = null;
  clearReproLive();
  chatSessionId = newChatSessionId();
  document.getElementById('chat-head').title = 'session_id: ' + chatSessionId;
  addAssistant("Hi — chat normally anytime. When you want the **full repro agent** (browser, curl, screenshots), just say so or paste an issue link — I’ll decide when to start it. You can also expand **Repro log** and pick a run in the sidebar.");
  logBody.textContent = '';
  logWrap.classList.remove('open');
  logToggle.textContent = '▸ Repro log — pick a run in the sidebar';
};

document.getElementById('btn-stop-all').onclick = async () => {
  const r = await fetch('/api/interrupt', { method: 'POST' }).then(r => r.json());
  addSys(r.ok ? 'Stopped all repro agents.' : (r.message || 'Nothing running.'));
};

logToggle.onclick = () => {
  logWrap.classList.toggle('open');
  logToggle.textContent = logWrap.classList.contains('open')
    ? '▾ Repro log (' + (watchTaskId || 'none') + ')'
    : '▸ Repro log — pick a run in the sidebar';
};

// ── sidebar + SSE log ─────────────────────────────────────────────
let runs = [];

function fmt(ms) {
  return ms < 60000 ? Math.floor(ms / 1000) + 's' : Math.floor(ms / 60000) + 'm';
}

function renderRuns() {
  const act = runs.filter(r => r.status === 'run');
  const done = runs.filter(r => r.status === 'done');
  let h = '';
  if (act.length) {
    h += '<div class="section-label">Active</div>';
    for (const r of act) h += runRow(r);
  }
  if (done.length) {
    h += '<div class="section-label">History</div>';
    for (const r of done) h += runRow(r);
  }
  sessionsEl.innerHTML = h || '<div style="padding:16px;font-size:12px;color:var(--muted)">No runs yet.</div>';
}

function runRow(r) {
  const on = r.taskId === watchTaskId ? ' on' : '';
  const pulse = r.status === 'run' ? '<span class="pulse"></span>' : '';
  const vmap = {0:'None',1:'Fail',2:'Part',3:'Sim',4:'Repro',5:'OK'};
  const vchip = r.status === 'run'
    ? '<span class="chip crun">Run</span>'
    : '<span class="chip ' + (r.verdict >= 4 ? 'cok' : r.verdict >= 2 ? 'cmed' : 'cbad') + '">' + (vmap[r.verdict]||r.verdict) + '</span>';
  return `<div class="row${on}" data-tid="${esc(r.taskId)}">
    <div class="t">${pulse}${esc(r.title)}</div>
    <div class="m">${r.num ? '#' + r.num : ''} ${vchip} ${r.dur ? fmt(r.dur) : ''}</div>
  </div>`;
}

sessionsEl.addEventListener('click', e => {
  const row = e.target.closest('.row');
  if (!row) return;
  const tid = row.dataset.tid;
  if (!tid) return;
  watchTaskId = tid;
  renderRuns();
  logWrap.classList.add('open');
  logToggle.textContent = '▾ Repro log (' + tid + ')';
  logBody.innerHTML = '';
  logLine('[watching ' + tid + ']');
});

function logLine(s) {
  logBody.textContent += s + '\n';
  logBody.scrollTop = logBody.scrollHeight;
}

function connectSSE() {
  if (es) es.close();
  es = new EventSource('/live');
  es.onmessage = e => {
    const ev = JSON.parse(e.data);
    if (ev.type === 'run_setup') {
      handleReproSetupEvent(ev);
      return;
    }
    if (ev.type === 'run_plan') {
      handleReproPlanEvent(ev);
      return;
    }
    if (ev.type === 'run_setup_error') {
      handleReproSetupError(ev);
      return;
    }
    if (ev.type === 'run_agent_ready') {
      markReproAgentReady(ev);
      return;
    }
    if (ev.type === 'run_start') {
      loadRuns();
      if (liveEventForThisChat(ev)) {
        lastMsgUpdateLine = null;
        addSys('Repro started: #' + ev.issueNumber + ' — ' + (ev.issueTitle || ''));
        ensureReproLivePanel(ev);
      }
      renderRuns();
    }
    if (ev.type === 'run_end') {
      if (liveEventForThisChat(ev)) {
        finishReproLivePanel(ev.taskId, ev.verdict, ev.verdictReasoning);
        lastMsgUpdateLine = null;
      }
      loadRuns();
    }
    if (ev.type === 'no_eligible_issue') addSys('No eligible issue (cooldown?). Try a specific #number.');

    handleReproLiveEvent(ev);

    if (watchTaskId && ev.taskId === watchTaskId) {
      const ae = ev.assistantMessageEvent;
      if (ev.type === 'message_update' && ae && (ae.delta || ae.text)) {
        const bit = String(ae.delta ?? ae.text ?? '').slice(0, 180);
        if (bit) logLine((ae.type || 'msg') + ': ' + bit);
      } else if (ev.type === 'tool_execution_start') {
        logLine('→ ' + ev.toolName + ' ' + JSON.stringify(ev.args || {}).slice(0, 120));
      } else if (ev.type === 'tool_execution_end') {
        logLine('← ' + ev.toolName + ' ' + String(JSON.stringify(ev.result || '')).slice(0, 200));
      } else if (ev.type === 'tool_execution_update') {
        logLine('⋯ ' + ev.toolName + ' ' + String(JSON.stringify(ev.partialResult ?? '')).slice(0, 160));
      }
    }
  };
}

async function loadRuns() {
  const [st, hist] = await Promise.all([
    fetch('/api/status').then(r => r.json()).catch(() => ({ active: [] })),
    fetch('/api/history').then(r => r.json()).catch(() => []),
  ]);
  const activeIds = new Set((st.active || []).map(x => x.taskId));
  const act = (st.active || []).map(a => ({
    taskId: a.taskId, title: a.issueTitle, num: a.issueNumber, status: 'run', verdict: 3, dur: null,
  }));
  const done = hist
    .filter(h => h.issue_number && !activeIds.has(taskIdFromPath(h.report_path)))
    .map(h => ({
      taskId: taskIdFromPath(h.report_path),
      title: '#' + h.issue_number,
      num: h.issue_number,
      status: 'done',
      verdict: h.verdict,
      dur: h.duration_ms,
    }));
  runs = [...act, ...done];
  renderRuns();
}

function taskIdFromPath(p) {
  if (!p) return '';
  const parts = p.split('/');
  const i = parts.indexOf('runs');
  return i >= 0 && parts[i + 1] ? parts[i + 1] : p;
}

// boot
connectSSE();
loadRuns();
setInterval(loadRuns, 8000);
document.getElementById('btn-new').click();
document.getElementById('chat-head').title = 'session_id: ' + chatSessionId;
input.focus();
</script>
