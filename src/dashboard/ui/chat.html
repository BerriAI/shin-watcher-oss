<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>shin-watcher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f;
      --sidebar: #111114;
      --surface: #18191e;
      --border: #25262c;
      --text: #e2e4ec;
      --muted: #636470;
      --cyan: #38bdf8;
      --yellow: #fbbf24;
      --green: #34d399;
      --red: #f87171;
      --purple: #c084fc;
      --gray: #3f3f46;
      --accent: #6366f1;
      --mono: "JetBrains Mono","Fira Code",ui-monospace,monospace;
      --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

    /* ── Shell ── */
    .shell { display: flex; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px; min-width: 200px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 12px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .logo { width: 22px; height: 22px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .sidebar-title { font-size: 14px; font-weight: 600; flex: 1; }
    .btn-new {
      background: var(--accent); color: #fff; border: none;
      border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .btn-new:hover { opacity: 0.85; }

    /* New session input (shown when + clicked) */
    .new-session-form {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: none;
    }
    .new-session-form.open { display: block; }
    .new-session-form input {
      width: 100%; background: var(--surface); border: 1px solid var(--accent);
      border-radius: 6px; padding: 7px 10px; font-size: 12px; color: var(--text);
      font-family: var(--mono); outline: none;
    }
    .new-session-form input::placeholder { color: var(--muted); }
    .new-session-hint { font-size: 10px; color: var(--muted); margin-top: 5px; }

    /* Sessions list */
    .sessions { flex: 1; overflow-y: auto; }
    .section-label {
      padding: 10px 12px 4px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
    }
    .session-row {
      padding: 8px 12px; cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.1s;
    }
    .session-row:hover { background: rgba(255,255,255,0.04); }
    .session-row.active { background: rgba(99,102,241,0.1); border-left-color: var(--accent); }
    .session-row.selected { background: rgba(56,189,248,0.08); border-left-color: var(--cyan); }
    .session-row-title {
      font-size: 12px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 6px; margin-bottom: 3px;
    }
    .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
    .session-row-meta { font-size: 10px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
    .chip { font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 3px; }
    .chip-run  { background: rgba(99,102,241,0.2); color: #a5b4fc; }
    .chip-ok   { background: rgba(52,211,153,0.15); color: var(--green); }
    .chip-fail { background: rgba(248,113,113,0.15); color: var(--red); }
    .chip-part { background: rgba(251,191,36,0.15); color: var(--yellow); }

    /* ── Main chat ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Empty state */
    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      color: var(--muted);
    }
    .empty-icon { font-size: 36px; opacity: 0.3; }
    .empty-text { font-size: 13px; }
    .empty-hint { font-size: 12px; color: var(--muted); opacity: 0.6; }

    /* Chat header */
    .chat-header {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      min-height: 48px;
    }
    .chat-header-title { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-stop {
      background: rgba(248,113,113,0.12); color: var(--red);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: 6px; padding: 5px 10px; font-size: 12px;
      font-weight: 600; cursor: pointer; display: none;
    }
    .btn-stop.show { display: block; }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 2px; }
    .msg { display: flex; gap: 8px; padding: 2px 0; }
    .msg-role { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; flex-shrink: 0; width: 48px; text-align: right; padding-top: 3px; }
    .msg-body { flex: 1; font-size: 13px; line-height: 1.6; word-break: break-word; min-width: 0; }
    .msg.think .msg-role { color: var(--gray); }
    .msg.think .msg-body { color: #52525b; font-style: italic; font-size: 12px; }
    .msg.agent .msg-role { color: var(--cyan); }
    .msg.agent .msg-body { color: var(--text); }
    .msg.tool  .msg-role { color: var(--yellow); }
    .msg.tool  .msg-body { color: var(--yellow); font-family: var(--mono); font-size: 11px; }
    .msg.res   .msg-role { color: var(--green); }
    .msg.res   .msg-body { color: var(--muted); font-family: var(--mono); font-size: 11px; }
    .msg.err   .msg-role { color: var(--red); }
    .msg.err   .msg-body { color: var(--red); font-family: var(--mono); font-size: 11px; }
    .msg.you   .msg-role { color: var(--purple); }
    .msg.you   .msg-body { color: var(--text); background: rgba(192,132,252,0.1); border-radius: 6px; padding: 5px 10px; margin-left: -10px; }
    .msg.sys   .msg-role { color: #3f3f46; }
    .msg.sys   .msg-body { color: var(--muted); font-size: 12px; font-style: italic; }
    .tool-badge { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.2); border-radius: 3px; padding: 0 5px; font-size: 10px; margin-right: 5px; }

    /* Input */
    .input-row {
      padding: 12px 18px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
    }
    textarea {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 13px; font-size: 13px; color: var(--text);
      font-family: var(--sans); resize: none; outline: none;
      line-height: 1.5; min-height: 40px; max-height: 120px;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    textarea:disabled { opacity: 0.4; }
    .btn-send {
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .btn-send:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">S</div>
      <span class="sidebar-title">shin-watcher</span>
      <button class="btn-new" id="btn-new">+ New</button>
    </div>

    <div class="sessions" id="sessions-list"></div>
  </aside>

  <!-- ── Main ── -->
  <main class="main" id="main">
    <div class="empty" id="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">No session selected</div>
      <div class="empty-hint">Click + New · runs are parallel, each gets its own worktree</div>
    </div>
  </main>

</div>
<script>
// ── state ──────────────────────────────────────────────────────────────────
let sessions = [];       // {id, taskId?, issueNumber, issueTitle, issueUrl, status, verdict, difficulty, durationMs, prUrl, startedAt}
let selected = null;     // session id
let es = null;           // EventSource
let currentTaskId = null;

// ── dom ────────────────────────────────────────────────────────────────────
const main         = document.getElementById('main');
const emptyState   = document.getElementById('empty-state');
const sessionsList = document.getElementById('sessions-list');
const btnNew       = document.getElementById('btn-new');

// ── helpers ────────────────────────────────────────────────────────────────
const esc  = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const trunc = (s,n) => s.length > n ? s.slice(0,n)+'…' : s;
const fmt  = ms => ms < 60000 ? `${(ms/1000).toFixed(0)}s` : `${Math.floor(ms/60000)}m`;

function verdictChip(v, status) {
  if (status === 'running') return '<span class="chip chip-run">Running</span>';
  const map = {0:'None',1:'Failed',2:'Partial',3:'Similar',4:'Repro',5:'Validated'};
  const cls = v >= 4 ? 'chip-ok' : v >= 2 ? 'chip-part' : 'chip-fail';
  return `<span class="chip ${cls}">${map[v]??v}</span>`;
}

// ── sidebar rendering ──────────────────────────────────────────────────────
function renderSidebar() {
  const active = sessions.filter(s => s.status === 'running');
  const past   = sessions.filter(s => s.status !== 'running');

  let html = '';
  if (active.length) {
    html += `<div class="section-label">Active</div>`;
    for (const s of active) html += sessionRow(s);
  }
  if (past.length) {
    html += `<div class="section-label">History</div>`;
    for (const s of past) html += sessionRow(s);
  }
  if (!html) html = `<div style="padding:20px 12px;font-size:12px;color:var(--muted)">No sessions yet.<br>Click + New to start.</div>`;
  sessionsList.innerHTML = html;
}

function sessionRow(s) {
  const sel = s.id === selected ? ' selected' : '';
  const act = s.status === 'running' ? ' active' : '';
  const pulse = s.status === 'running' ? '<span class="pulse"></span>' : '';
  return `<div class="session-row${sel}${act}" onclick="selectSession('${s.id}')">
    <div class="session-row-title">${pulse}${esc(s.issueTitle ?? '#'+s.issueNumber)}</div>
    <div class="session-row-meta">
      <span>#${s.issueNumber}</span>
      ${verdictChip(s.verdict, s.status)}
      ${s.durationMs ? `<span>${fmt(s.durationMs)}</span>` : ''}
      ${s.prUrl ? `<a href="${esc(s.prUrl)}" target="_blank" style="color:var(--green);font-size:10px" onclick="event.stopPropagation()">PR↗</a>` : ''}
    </div>
  </div>`;
}

// ── chat panel rendering ───────────────────────────────────────────────────
function buildChatPanel(s) {
  const isLive = s.status === 'running';
  return `
    <div class="chat-header">
      <div class="chat-header-title">
        ${isLive ? '<span class="pulse" style="display:inline-block;margin-right:6px"></span>' : ''}
        <a href="${esc(s.issueUrl||'')}" target="_blank" style="color:var(--text);text-decoration:none">#${s.issueNumber} — ${esc(s.issueTitle)}</a>
      </div>
      ${isLive ? '<button class="btn-stop show" id="btn-stop">■ Stop</button>' : ''}
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-row">
      <textarea id="chat-input" rows="1"
        placeholder="${isLive ? 'Steer the agent… (Enter to send)' : 'Session ended'}"
        ${isLive ? '' : 'disabled'}></textarea>
      <button class="btn-send" id="btn-send" ${isLive ? '' : 'disabled'}>Send</button>
    </div>`;
}

function selectSession(id) {
  selected = id;
  renderSidebar();
  const s = sessions.find(x => x.id === id);
  if (!s) return;

  // Render chat panel
  emptyState.style.display = 'none';
  // Remove old panel if any
  const old = document.getElementById('chat-panel');
  if (old) old.remove();
  const panel = document.createElement('div');
  panel.id = 'chat-panel';
  panel.style.cssText = 'flex:1;display:flex;flex-direction:column;overflow:hidden;';
  panel.innerHTML = buildChatPanel(s);
  main.appendChild(panel);

  // Wire stop button
  const stopBtn = document.getElementById('btn-stop');
  if (stopBtn) stopBtn.onclick = interrupt;

  // Wire input
  const inp = document.getElementById('chat-input');
  const sendBtn = document.getElementById('btn-send');
  if (inp && sendBtn) {
    sendBtn.onclick = () => sendSteer(s);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendSteer(s); }
    });
    inp.addEventListener('input', () => {
      inp.style.height = 'auto';
      inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
    });
  }

  // Load content
  if (s.status === 'running') {
    subscribeToActive(s.taskId);
  } else {
    replaySession(s);
  }
}
window.selectSession = selectSession;

// ── stream / replay ────────────────────────────────────────────────────────
let lastStreamCls = null, lastStreamEl = null;

function appendMsg(cls, role, html) {
  const msgs = document.getElementById('messages');
  if (!msgs) return null;
  const d = document.createElement('div');
  d.className = `msg ${cls}`;
  d.innerHTML = `<span class="msg-role">${role}</span><span class="msg-body">${html}</span>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

function appendDelta(cls, role, html) {
  if (lastStreamCls === cls && lastStreamEl) {
    lastStreamEl.querySelector('.msg-body').innerHTML += html;
    document.getElementById('messages')?.scrollTo(0, 9999999);
  } else {
    lastStreamEl = appendMsg(cls, role, html);
    lastStreamCls = cls;
  }
}

function resetStream() { lastStreamCls = null; lastStreamEl = null; }

function handleEvent(ev) {
  const type = ev.type;
  if (type === 'connected' || type === 'run_start') return; // handled elsewhere

  if (type === 'run_end') {
    resetStream();
    appendMsg('sys', 'sys', '■ run finished');
    // Refresh sessions so status flips to done
    loadSessions();
    // Re-render panel without steer input
    if (selected) { const s = sessions.find(x=>x.id===selected); if(s) selectSession(s.id); }
    return;
  }

  if (type === 'message_update') {
    const ae = ev.assistantMessageEvent;
    if (!ae) return;
    if (ae.type === 'thinking_delta' && ae.delta) appendDelta('think','·','<span>'+esc(ae.delta)+'</span>');
    else if (ae.type === 'text_delta' && ae.delta) appendDelta('agent','agent',esc(ae.delta));
    else resetStream();
    return;
  }

  resetStream();
  if (type === 'tool_execution_start') {
    if (ev.toolName === '__steer__') { appendMsg('you','you',esc(ev.args?.message??'')); return; }
    appendMsg('tool','tool',`<span class="tool-badge">${esc(ev.toolName)}</span>${esc(trunc(JSON.stringify(ev.args??{}),250))}`);
    return;
  }
  if (type === 'tool_execution_end') {
    appendMsg(ev.isError?'err':'res', ev.isError?'error':'result',
      `<span class="tool-badge">${esc(ev.toolName)}</span>${esc(trunc(JSON.stringify(ev.result??''),350))}`);
    return;
  }
  if (type === 'agent_start') appendMsg('sys','sys','▶ agent started');
  if (type === 'agent_end')   appendMsg('sys','sys','■ agent ended');
}

function subscribeToActive(taskId) {
  appendMsg('sys','sys','Connected to live feed…');
}

async function replaySession(s) {
  if (!s.taskId) return;
  try {
    const events = await fetch(`/api/runs/${s.taskId}/transcript`).then(r=>r.json());
    for (let i = 0; i < events.length; i++) {
      handleEvent(events[i]);
      if (i % 8 === 0) await sleep(8);
    }
  } catch {
    appendMsg('sys','sys','Transcript not available.');
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── global SSE ─────────────────────────────────────────────────────────────
function connectSSE() {
  if (es) es.close();
  es = new EventSource('/live');
  es.onmessage = e => {
    const ev = JSON.parse(e.data);

    // If run_start, add a new session to sidebar
    if (ev.type === 'run_start') {
      const exists = sessions.find(s => s.taskId === ev.taskId);
      if (!exists) {
        const sess = {
          id: ev.taskId,
          taskId: ev.taskId,
          issueNumber: ev.issueNumber,
          issueTitle: ev.issueTitle,
          issueUrl: ev.issueUrl,
          status: 'running',
          verdict: 3,
          startedAt: ev.startedAt,
        };
        sessions.unshift(sess);
        renderSidebar();
        // Auto-select the new session
        selectSession(sess.id);
      }
      return;
    }

    if (ev.type === 'run_end') {
      const s = sessions.find(x => x.taskId === ev.taskId);
      if (s) { s.status = 'done'; renderSidebar(); }
      // Refresh to pick up verdict from DB
      setTimeout(loadSessions, 2000);
    }

    // Route events to the currently selected session's panel
    const activeSession = sessions.find(x => x.taskId === ev.taskId);
    if (activeSession && activeSession.id === selected) {
      handleEvent(ev);
    }
  };
}

// ── steer / interrupt ──────────────────────────────────────────────────────
async function sendSteer(s) {
  const inp = document.getElementById('chat-input');
  if (!inp) return;
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  inp.style.height = 'auto';
  resetStream();
  appendMsg('you','you',esc(msg));
  const r = await fetch('/api/steer', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ message: msg }),
  }).then(r=>r.json()).catch(e=>({error:e.message}));
  if (r.error) appendMsg('sys','sys',esc(r.error));
}

async function interrupt() {
  const r = await fetch('/api/interrupt',{method:'POST'}).then(r=>r.json()).catch(()=>({}));
  appendMsg('sys','sys', r.ok ? 'Interrupting…' : (r.message||'Nothing to interrupt.'));
}

// ── new session ────────────────────────────────────────────────────────────
btnNew.addEventListener('click', () => {
  newForm.classList.toggle('open');
  if (newForm.classList.contains('open')) newInput.focus();
  else newInput.value = '';
});

newInput.addEventListener('keydown', async e => {
  if (e.key === 'Escape') { newForm.classList.remove('open'); newInput.value = ''; return; }
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const val = newInput.value.trim();
  newInput.value = '';
  newForm.classList.remove('open');

  // Detect if it's an issue number/URL or freeform description
  const isRef = !val || /^\d+$|^#\d+|github\.com/.test(val);
  const command = isRef ? (val || 'next') : 'next';
  // If freeform, steer the agent with it once it starts
  const steerMessage = isRef ? undefined : val;

  await fetch('/api/invoke', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ command, steerMessage }),
  }).then(r=>r.json()).catch(e=>({error:e.message}));
  // run_start SSE will auto-add and select the session
});

// ── load sessions ──────────────────────────────────────────────────────────
async function loadSessions() {
  const [statusData, history] = await Promise.all([
    fetch('/api/status').then(r=>r.json()).catch(()=>({active:[]})),
    fetch('/api/history').then(r=>r.json()).catch(()=>[]),
  ]);

  const verdicts = {0:'None',1:'Failed',2:'Partial',3:'Similar',4:'Repro',5:'Validated'};

  // Build sessions list: active runs first, then history
  const activeIds = new Set((statusData.active||[]).map(r=>r.taskId));

  const activeSessions = (statusData.active||[]).map(r => ({
    id: r.taskId, taskId: r.taskId,
    issueNumber: r.issueNumber, issueTitle: r.issueTitle, issueUrl: r.issueUrl,
    status: 'running', verdict: 3, startedAt: r.startedAt,
  }));

  const historySessions = history
    .filter(r => !activeIds.has(taskIdFromPath(r.report_path)))
    .map(r => {
      const taskId = taskIdFromPath(r.report_path);
      return {
        id: taskId, taskId,
        issueNumber: r.issue_number, issueTitle: `#${r.issue_number}`,
        issueUrl: `https://github.com/BerriAI/litellm/issues/${r.issue_number}`,
        status: 'done', verdict: r.verdict, difficulty: r.difficulty,
        durationMs: r.duration_ms, prUrl: r.pr_url,
      };
    });

  sessions = [...activeSessions, ...historySessions];
  renderSidebar();

  // Auto-select first active session if nothing selected
  if (!selected && activeSessions.length > 0) {
    selectSession(activeSessions[0].id);
  }
}

function taskIdFromPath(p) {
  if (!p) return '';
  const parts = p.split('/');
  const idx = parts.indexOf('runs');
  return idx >= 0 && parts[idx+1] ? parts[idx+1] : p;
}

// ── boot ───────────────────────────────────────────────────────────────────
(async () => {
  connectSSE();
  await loadSessions();
  // Refresh sidebar every 5s
  setInterval(loadSessions, 5000);
})();
</script>
</body>
</html>
