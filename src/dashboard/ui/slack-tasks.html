<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>shin-watcher — Slack tasks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --sidebar: #111114; --surface: #18191e; --border: #25262c;
      --text: #e2e4ec; --muted: #636470; --cyan: #38bdf8; --green: #34d399;
      --red: #f87171; --yellow: #fbbf24; --purple: #c084fc; --accent: #6366f1;
      --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      --mono: ui-monospace, monospace;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

    /* ── shell ── */
    .shell { display: flex; height: 100vh; }

    /* ── sidebar ── */
    .sidebar { width: 200px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 12px 0; flex-shrink: 0; }
    .sidebar-header { padding: 0 12px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .logo { width: 22px; height: 22px; background: var(--accent); border-radius: 6px; display: grid; place-items: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .logo-label { font-size: 13px; font-weight: 700; }
    .nav-link { display: flex; align-items: center; gap: 8px; padding: 7px 12px; font-size: 13px; color: var(--muted); text-decoration: none; border-radius: 6px; margin: 1px 6px; }
    .nav-link:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-link.active { background: rgba(99,102,241,0.12); color: var(--text); }
    .nav-icon { font-size: 14px; width: 18px; text-align: center; }

    /* ── main ── */
    .main { flex: 1; overflow-y: auto; padding: 28px 32px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

    /* ── filter bar ── */
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-tab {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      padding: 5px 11px; font-size: 12px; font-weight: 500; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
    }
    .filter-tab:hover { color: var(--text); border-color: var(--accent); }
    .filter-tab.active { background: rgba(99,102,241,0.18); border-color: rgba(99,102,241,0.45); color: #c7d2fe; }
    .filter-tab .count { font-size: 11px; padding: 1px 6px; border-radius: 10px; background: rgba(255,255,255,0.06); color: var(--muted); font-weight: 600; }
    .filter-tab.active .count { background: rgba(255,255,255,0.12); color: #e0e7ff; }
    .controls { display: flex; align-items: center; gap: 10px; }
    .last-updated { font-size: 11px; color: var(--muted); }
    .btn-refresh { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 12px; padding: 5px 10px; cursor: pointer; }
    .btn-refresh:hover { color: var(--text); border-color: var(--accent); }

    /* ── task cards ── */
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; display: flex; align-items: flex-start; gap: 12px;
      cursor: pointer; text-decoration: none; color: inherit;
      transition: border-color 0.12s ease, background 0.12s ease;
    }
    .task-card:hover { border-color: rgba(99,102,241,0.4); background: rgba(99,102,241,0.04); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .status-running { background: var(--green); animation: p 1.4s ease-in-out infinite; }
    .status-pending { background: var(--yellow); }
    .status-done { background: rgba(99,102,241,0.7); }
    .status-failed { background: var(--red); }
    .status-abandoned { background: var(--muted); }
    @keyframes p { 50% { opacity: 0.3; transform: scale(0.85); } }
    .task-body { flex: 1; min-width: 0; }
    .task-row1 { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .status-chip { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; }
    .chip-running { background: rgba(52,211,153,0.16); color: var(--green); }
    .chip-pending { background: rgba(251,191,36,0.15); color: var(--yellow); }
    .chip-done { background: rgba(99,102,241,0.18); color: #a5b4fc; }
    .chip-failed { background: rgba(248,113,113,0.15); color: var(--red); }
    .chip-abandoned { background: rgba(120,120,130,0.18); color: var(--muted); }
    .kind-chip { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: rgba(255,255,255,0.05); color: var(--muted); font-weight: 600; }
    .session-id { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .raw-text { font-size: 13px; color: var(--text); margin-top: 6px; line-height: 1.4; word-break: break-word; }
    .task-meta { font-size: 11px; color: var(--muted); margin-top: 6px; display: flex; gap: 14px; flex-wrap: wrap; }
    .task-meta b { font-weight: 600; color: var(--text); }
    .err-row { font-size: 12px; color: var(--red); margin-top: 6px; padding: 6px 9px; border-radius: 5px; background: rgba(248,113,113,0.06); border: 1px solid rgba(248,113,113,0.16); word-break: break-word; }
    .empty { font-size: 13px; color: var(--muted); font-style: italic; padding: 14px 0; text-align: center; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="logo">S</div>
      <span class="logo-label">shin-watcher</span>
    </div>
    <a class="nav-link" href="/"><span class="nav-icon">💬</span> Chat</a>
    <a class="nav-link" href="/runs"><span class="nav-icon">🔬</span> Runs</a>
    <a class="nav-link active" href="/slack-tasks"><span class="nav-icon">📨</span> Slack tasks</a>
  </nav>

  <main class="main">
    <h1>Slack tasks</h1>
    <p class="subtitle">Durable record of every Slack message — guaranteed to close the loop or be marked abandoned.</p>

    <div class="toolbar">
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-filter="all">All <span class="count" id="cnt-all">0</span></button>
        <button class="filter-tab" data-filter="running">Running <span class="count" id="cnt-running">0</span></button>
        <button class="filter-tab" data-filter="pending">Pending <span class="count" id="cnt-pending">0</span></button>
        <button class="filter-tab" data-filter="done">Done <span class="count" id="cnt-done">0</span></button>
        <button class="filter-tab" data-filter="failed">Failed <span class="count" id="cnt-failed">0</span></button>
        <button class="filter-tab" data-filter="abandoned">Abandoned <span class="count" id="cnt-abandoned">0</span></button>
      </div>
      <div class="controls">
        <span class="last-updated" id="last-updated"></span>
        <button class="btn-refresh" onclick="load()">↻ Refresh</button>
      </div>
    </div>

    <div class="task-list" id="task-list">
      <div class="empty">Loading…</div>
    </div>
  </main>
</div>

<script>
let currentFilter = 'all';
let allTasks = [];

function relTime(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const s = Math.floor(diff / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

function fmtAbsTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  const ss = String(d.getSeconds()).padStart(2, '0');
  return `${hh}:${mm}:${ss}`;
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '…' : s;
}

function renderTask(t) {
  const status = t.status;
  const elapsedMs = Date.now() - new Date(t.createdAt).getTime();
  const elapsedSec = Math.floor(elapsedMs / 1000);
  const elapsedHuman =
    elapsedSec < 60 ? `${elapsedSec}s` :
    elapsedSec < 3600 ? `${Math.floor(elapsedSec/60)}m ${elapsedSec%60}s` :
    `${Math.floor(elapsedSec/3600)}h ${Math.floor((elapsedSec%3600)/60)}m`;

  const idleSec = Math.floor(
    (Date.now() - new Date(t.updatedAt).getTime()) / 1000
  );

  const finishedLine = t.finishedAt
    ? `<span><b>Finished:</b> ${relTime(t.finishedAt)}</span>`
    : status === 'running'
      ? `<span><b>Idle:</b> ${idleSec}s since last activity</span>`
      : '';

  const errBlock = t.errorMessage
    ? `<div class="err-row">${escapeHtml(t.errorMessage)}</div>`
    : '';

  const placeholderLine = t.placeholderTs
    ? `<span title="Slack message ts">ts <code style="font-family:var(--mono);font-size:11px">${t.placeholderTs}</code></span>`
    : '';

  return `
    <a href="/slack-tasks/${t.id}" class="task-card">
      <div class="status-dot status-${status}"></div>
      <div class="task-body">
        <div class="task-row1">
          <span class="status-chip chip-${status}">${status}</span>
          <span class="kind-chip">${t.kind}</span>
          <span class="session-id">${escapeHtml(t.langfuseSessionId)}</span>
        </div>
        <div class="raw-text">${escapeHtml(truncate(t.rawText, 400))}</div>
        <div class="task-meta">
          <span><b>Started:</b> ${fmtAbsTime(t.createdAt)} (${relTime(t.createdAt)})</span>
          <span><b>Elapsed:</b> ${elapsedHuman}</span>
          ${finishedLine}
          <span><b>Attempts:</b> ${t.attempts}</span>
          ${placeholderLine}
        </div>
        ${errBlock}
      </div>
    </a>
  `;
}

function applyFilter() {
  const list = document.getElementById('task-list');
  const filtered = currentFilter === 'all'
    ? allTasks
    : allTasks.filter((t) => t.status === currentFilter);
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">No tasks match filter "${currentFilter}".</div>`;
    return;
  }
  list.innerHTML = filtered.map(renderTask).join('');
}

async function load() {
  document.getElementById('last-updated').textContent = 'Refreshing…';
  try {
    const res = await fetch('/api/slack-tasks?status=all&limit=200');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allTasks = data.tasks ?? [];
    const counts = data.counts ?? {};
    const allCount = Object.values(counts).reduce((a, b) => a + Number(b), 0);
    document.getElementById('cnt-all').textContent = allCount;
    document.getElementById('cnt-running').textContent = counts.running ?? 0;
    document.getElementById('cnt-pending').textContent = counts.pending ?? 0;
    document.getElementById('cnt-done').textContent = counts.done ?? 0;
    document.getElementById('cnt-failed').textContent = counts.failed ?? 0;
    document.getElementById('cnt-abandoned').textContent = counts.abandoned ?? 0;
    applyFilter();
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('task-list').innerHTML =
      `<div class="empty" style="color:var(--red)">Failed to load: ${escapeHtml(e.message)}</div>`;
    document.getElementById('last-updated').textContent = '';
  }
}

document.getElementById('filter-tabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-tab');
  if (!btn) return;
  currentFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-tab').forEach((el) => {
    el.classList.toggle('active', el.dataset.filter === currentFilter);
  });
  applyFilter();
});

load();
setInterval(load, 5000);
</script>
</body>
</html>
